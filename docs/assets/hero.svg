<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#1b263b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7fb8ff"/>
    </marker>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- title -->
  <text x="60" y="80" fill="#e0e6f0" font-size="44" font-weight="700">OASIS</text>
  <text x="60" y="118" fill="#9fb3d1" font-size="20">Open Agent Social Interaction Simulations</text>
  <text x="60" y="146" fill="#6f86a8" font-size="15">Yang et al. (2024) · arXiv:2411.11581 · socsim reimplementation</text>

  <!-- pipeline labels -->
  <text x="60" y="210" fill="#7fb8ff" font-size="14">Time Engine</text>
  <text x="200" y="210" fill="#7fb8ff" font-size="14">RecSys</text>
  <text x="320" y="210" fill="#ffb86b" font-size="14">LLM action</text>
  <text x="470" y="210" fill="#7fb8ff" font-size="14">Propagation</text>
  <text x="620" y="210" fill="#7fb8ff" font-size="14">Metrics</text>

  <!-- pipeline arrows -->
  <line x1="120" y1="240" x2="195" y2="240" stroke="#7fb8ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="260" y1="240" x2="315" y2="240" stroke="#7fb8ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="415" y1="240" x2="465" y2="240" stroke="#ffb86b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="565" y1="240" x2="615" y2="240" stroke="#7fb8ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- scale-free follow graph (decorative) -->
  <g stroke="#3d5a80" stroke-width="1.5" stroke-opacity="0.7">
    <line x1="980" y1="90" x2="1080" y2="60"/>
    <line x1="980" y1="90" x2="1090" y2="140"/>
    <line x1="980" y1="90" x2="900" y2="160"/>
    <line x1="980" y1="90" x2="1050" y2="200"/>
    <line x1="980" y1="90" x2="880" y2="80"/>
    <line x1="1090" y1="140" x2="1140" y2="200"/>
    <line x1="900" y1="160" x2="950" y2="230"/>
  </g>
  <g fill="#7fb8ff">
    <circle cx="980" cy="90" r="18"/>
    <circle cx="1080" cy="60" r="8"/>
    <circle cx="1090" cy="140" r="9"/>
    <circle cx="900" cy="160" r="8"/>
    <circle cx="1050" cy="200" r="7"/>
    <circle cx="880" cy="80" r="6"/>
    <circle cx="1140" cy="200" r="6"/>
    <circle cx="950" cy="230" r="6"/>
  </g>
  <text x="960" y="265" fill="#6f86a8" font-size="13">Barabási–Albert follow graph</text>
</svg>
